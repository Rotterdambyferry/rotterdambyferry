<body>

<!-- INCLUDE:header -->

<div class="kaart-kop">
  <h1>De kaart van mijn Rotterdam <span class="groen">&#128154;</span></h1>
  <p>Alle plekken uit de verhalen op &eacute;&eacute;n kaart. Filter op wat je zoekt, klik op een pin en lees het verhaal erbij.</p>
</div>

<section class="filters" aria-label="Filter plekken">
  <div class="inner">
    <div class="groep">
      <span class="label">Categorie</span>
      <div class="chips">
        <button class="filterknop" data-filter="categorie" data-waarde="alles" aria-pressed="true">Alles</button>
        <button class="filterknop" data-filter="categorie" data-waarde="restaurant" aria-pressed="false">Restaurant</button>
        <button class="filterknop" data-filter="categorie" data-waarde="lunchplek" aria-pressed="false">Lunchplek</button>
        <button class="filterknop" data-filter="categorie" data-waarde="bruine-kroeg" aria-pressed="false">Bruine kroeg</button>
        <button class="filterknop" data-filter="categorie" data-waarde="kidsproof" aria-pressed="false">Kidsproof</button>
        <button class="filterknop" data-filter="categorie" data-waarde="delicatessen" aria-pressed="false">Delicatessen</button>
        <button class="filterknop" data-filter="categorie" data-waarde="foodhal" aria-pressed="false">Foodhal</button>
        <button class="filterknop" data-filter="categorie" data-waarde="borrelplek" aria-pressed="false">Borrelplek</button>
        <button class="filterknop" data-filter="categorie" data-waarde="dagje-uit" aria-pressed="false">Dagje uit</button>
      </div>
    </div>
    <div class="groep">
      <span class="label">Gebied</span>
      <div class="chips">
        <button class="filterknop" data-filter="gebied" data-waarde="alles" aria-pressed="true">Alles</button>
        <button class="filterknop" data-filter="gebied" data-waarde="centrum" aria-pressed="false">Centrum</button>
        <button class="filterknop" data-filter="gebied" data-waarde="noord" aria-pressed="false">Noord</button>
        <button class="filterknop" data-filter="gebied" data-waarde="oost" aria-pressed="false">Oost</button>
        <button class="filterknop" data-filter="gebied" data-waarde="zuid" aria-pressed="false">Zuid</button>
        <button class="filterknop" data-filter="gebied" data-waarde="west" aria-pressed="false">West</button>
        <button class="filterknop" data-filter="gebied" data-waarde="maasvlakte" aria-pressed="false">Maasvlakte</button>
      </div>
    </div>
  </div>
</section>

<main class="kaart-sectie">
  <div id="plattegrond" role="region" aria-label="Kaart van Rotterdam met alle plekken uit de verhalen"></div>
  <p class="leeg" hidden>Nog geen plekken in deze combinatie &mdash; die komen eraan. Volg <a href="https://www.instagram.com/rotterdambyferry/">@rotterdambyferry</a> voor het laatste nieuws.</p>
</main>

<!-- INCLUDE:footer -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" integrity="sha256-Hk4dIpcqOSb0hZjgyvFOP+cEmDXUKKNE/tT542ZbNQg=" crossorigin=""></script>
<script>
  // De kaart: donkere CARTO-ondergrond met groene pins in de huisstijl.
  // De plekken komen uit places.json; de filterchips werken hetzelfde als
  // op de homepage (één actieve categorie + één actief gebied).
  (function () {
    var LABELS = {
      restaurant: "Restaurant", lunchplek: "Lunchplek", "bruine-kroeg": "Bruine kroeg",
      kidsproof: "Kidsproof", delicatessen: "Delicatessen", foodhal: "Foodhal",
      borrelplek: "Borrelplek", "dagje-uit": "Dagje uit",
      centrum: "Centrum", noord: "Noord", oost: "Oost", zuid: "Zuid",
      west: "West", maasvlakte: "Maasvlakte"
    };

    var map = L.map("plattegrond", { scrollWheelZoom: false }).setView([51.92, 4.47], 12);
    map.on("focus click", function () { map.scrollWheelZoom.enable(); });
    map.on("blur", function () { map.scrollWheelZoom.disable(); });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: "abcd",
      maxZoom: 19
    }).addTo(map);

    // Overlappende pins samenvoegen tot één groene stip met een getal.
    // Kleine radius: alleen clusteren als pins elkaar echt raken, niet
    // als plekken een paar straten uit elkaar liggen. Klikken zoomt in
    // tot de pins loskomen (en spiderfyt pas als inzoomen niet meer kan).
    var cluster = L.markerClusterGroup({
      maxClusterRadius: 25,
      showCoverageOnHover: false,
      zoomToBoundsOnClick: false, // eigen klikgedrag hieronder, zonder animatie
      animate: false,
      iconCreateFunction: function (c) {
        return L.divIcon({
          html: c.getChildCount(),
          className: "cluster-pin",
          iconSize: [34, 34]
        });
      }
    });
    // Klik op een cluster: direct inzoomen tot de pins loskomen; helpt
    // inzoomen niet meer (pins vrijwel op dezelfde plek), dan spiderfy
    cluster.on("clusterclick", function (e) {
      var b = e.layer.getBounds().pad(0.2);
      if (map.getBoundsZoom(b) > map.getZoom()) {
        map.fitBounds(b, { maxZoom: 17, animate: false });
      } else {
        e.layer.spiderfy();
      }
    });
    map.addLayer(cluster);

    var actief = { categorie: "alles", gebied: "alles" };
    var plekken = []; // { data, marker }
    var leeg = document.querySelector(".leeg");

    function popupHtml(p) {
      var tags = p.categorie.map(function (c) { return LABELS[c] || c; }).join(" &middot; ");
      tags += " &middot; " + (LABELS[p.gebied] || p.gebied);
      var tekst = '<p class="popup-naam">' + p.naam + "</p>" +
                  '<p class="popup-tags">' + tags + "</p>" +
                  '<p class="popup-wijk">' + p.wijk + "</p>";
      if (p.teaser) {
        tekst += '<p class="popup-teaser">' + p.teaser + "</p>";
      }
      // Met foto: foto bovenin, knop onderaan. Zonder foto (oudere entries):
      // de gewone tekstweergave met een simpele link.
      if (p.image) {
        if (p.post) {
          tekst += '<a class="popup-knop" href="' + p.post + '">Lees het verhaal &rarr;</a>';
        }
        return '<img class="popup-foto" src="' + p.image + '" alt="' + p.naam + '">' +
               '<div class="popup-tekst">' + tekst + "</div>";
      }
      if (p.post) {
        tekst += '<a class="popup-link" href="' + p.post + '">Lees het verhaal &rarr;</a>';
      }
      return '<div class="popup-tekst">' + tekst + "</div>";
    }

    function toonPlekken() {
      map.invalidateSize(); // voor het geval de pagina net geladen of geroteerd is
      var zichtbaar = [];
      plekken.forEach(function (plek) {
        var p = plek.data;
        var catOk = actief.categorie === "alles" || p.categorie.indexOf(actief.categorie) !== -1;
        var gebOk = actief.gebied === "alles" || p.gebied === actief.gebied;
        if (catOk && gebOk) {
          zichtbaar.push(plek.marker);
        }
      });
      // De clustergroep helemaal opnieuw vullen, zodat gefilterde pins
      // ook uit de cluster-telling verdwijnen
      cluster.clearLayers();
      cluster.addLayers(zichtbaar);
      leeg.hidden = zichtbaar.length > 0;
      if (zichtbaar.length > 0) {
        // animate: false — anders kan een direct volgende invalidateSize
        // (load-event/ResizeObserver) de zoom-animatie afbreken
        map.fitBounds(cluster.getBounds().pad(0.2), { maxZoom: 14, animate: false });
      }
    }

    fetch("places.json")
      .then(function (r) {
        if (!r.ok) throw new Error("places.json niet gevonden");
        return r.json();
      })
      .then(function (data) {
        data.forEach(function (p) {
          var marker = L.circleMarker([p.lat, p.lon], {
            radius: 9,
            color: "#FAF9F5",
            weight: 2,
            fillColor: "#1D7A46",
            fillOpacity: 1
          });
          marker.bindPopup(popupHtml(p), { maxWidth: 300, minWidth: p.image ? 300 : 200 });
          plekken.push({ data: p, marker: marker });
        });
        toonPlekken();
        // Nogmaals passend maken zodra alles (fonts, layout) geladen is
        window.addEventListener("load", toonPlekken);
        // En opnieuw passend maken als het kaartvak van afmeting verandert
        // (bijv. telefoon draaien, of het vak kreeg pas laat zijn echte maat)
        if (window.ResizeObserver) {
          var kaartDiv = document.getElementById("plattegrond");
          var vorigeBreedte = kaartDiv.offsetWidth;
          new ResizeObserver(function () {
            if (kaartDiv.offsetWidth !== vorigeBreedte) {
              vorigeBreedte = kaartDiv.offsetWidth;
              toonPlekken();
            }
          }).observe(kaartDiv);
        }
      })
      .catch(function () {
        leeg.hidden = false;
        leeg.innerHTML = "De plekken konden niet geladen worden. Probeer het later nog eens.";
      });

    document.querySelectorAll(".filterknop").forEach(function (knop) {
      knop.addEventListener("click", function () {
        var soort = knop.dataset.filter;
        actief[soort] = knop.dataset.waarde;
        document.querySelectorAll(".filterknop").forEach(function (k) {
          if (k.dataset.filter === soort) {
            k.setAttribute("aria-pressed", k === knop ? "true" : "false");
          }
        });
        toonPlekken();
      });
    });
  })();
</script>

<script src="assets/header.js" defer></script>

</body>
